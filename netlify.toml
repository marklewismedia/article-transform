[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 5173
  targetPort = 5173

[functions]
  node_bundler = "esbuild"

[functions."transform-article"]
  timeout = 30

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
